<!doctype html>

<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#ffdad6",
              error: "#ba1a1a",
              surface: "#f7f9fb",
              "surface-container-highest": "#e0e3e5",
              "on-primary-fixed-variant": "#004493",
              "surface-container-high": "#e6e8ea",
              "on-tertiary-fixed-variant": "#004d65",
              "on-primary": "#ffffff",
              "primary-container": "#0070ea",
              "outline-variant": "#c1c6d7",
              "on-primary-fixed": "#001a41",
              "tertiary-fixed": "#bee9ff",
              "inverse-on-surface": "#eff1f3",
              primary: "#0059bb",
              "on-secondary-fixed-variant": "#00504a",
              "secondary-container": "#8bf1e6",
              "surface-bright": "#f7f9fb",
              "tertiary-container": "#197ea0",
              "surface-container-lowest": "#ffffff",
              "on-background": "#191c1e",
              "on-secondary-fixed": "#00201d",
              "surface-dim": "#d8dadc",
              "surface-container": "#eceef0",
              outline: "#717786",
              "inverse-primary": "#adc7ff",
              "on-tertiary-fixed": "#001f2a",
              "primary-fixed-dim": "#adc7ff",
              "on-error": "#ffffff",
              "on-secondary-container": "#006f67",
              "on-error-container": "#93000a",
              "on-tertiary-container": "#fbfdff",
              "inverse-surface": "#2d3133",
              "primary-fixed": "#d8e2ff",
              "surface-variant": "#e0e3e5",
              tertiary: "#006481",
              secondary: "#006a63",
              "on-surface": "#191c1e",
              background: "#f7f9fb",
              "on-primary-container": "#fefcff",
              "on-tertiary": "#ffffff",
              "tertiary-fixed-dim": "#7ed1f7",
              "surface-tint": "#005bc0",
              "surface-container-low": "#f2f4f6",
              "secondary-fixed-dim": "#71d7cd",
              "secondary-fixed": "#8ef4e9",
              "on-surface-variant": "#414754",
              "on-secondary": "#ffffff",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .bg-mesh {
        background-color: #f7f9fb;
        background-image:
          radial-gradient(
            at 0% 0%,
            rgba(0, 89, 187, 0.05) 0px,
            transparent 50%
          ),
          radial-gradient(
            at 100% 100%,
            rgba(0, 106, 99, 0.05) 0px,
            transparent 50%
          );
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
    <style>
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(0, 89, 187, 0.1);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 89, 187, 0.2);
      }
    </style>
  </head>
  <body
    class="bg-background font-body text-on-background min-h-screen overflow-hidden"
  >
    <!-- Background Layer (Blurred Home Screen) -->
    <div
      class="fixed inset-0 z-0 bg-mesh filter blur-md grayscale-[0.2] opacity-60"
    >
      <header
        class="flex justify-between items-center px-6 h-16 w-full fixed top-0"
      >
        <span
          class="text-xl font-black text-blue-700 tracking-widest font-headline"
          >GLUCOSE</span
        >
        <div
          class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center"
        >
          <span class="material-symbols-outlined text-outline">person</span>
        </div>
      </header>
      <main class="pt-24 px-6 space-y-8">
        <div class="grid grid-cols-2 gap-4">
          <div
            class="col-span-2 h-64 rounded-xl bg-primary/10 flex flex-col justify-end p-6"
          >
            <div class="h-4 w-24 bg-primary/20 rounded mb-2"></div>
            <div class="h-12 w-48 bg-primary/30 rounded"></div>
          </div>
          <div class="h-40 rounded-xl bg-surface-container-high"></div>
          <div class="h-40 rounded-xl bg-secondary/10"></div>
        </div>
        <div class="space-y-4">
          <div class="h-20 rounded-lg bg-surface-container"></div>
          <div class="h-20 rounded-lg bg-surface-container"></div>
          <div class="h-20 rounded-lg bg-surface-container"></div>
        </div>
      </main>
      <footer
        class="fixed bottom-0 w-full h-20 bg-white/70 flex justify-around items-center px-8 pb-4"
      >
        <div class="w-12 h-12 flex items-center justify-center text-slate-400">
          <span class="material-symbols-outlined">home</span>
        </div>
        <div
          class="flex items-center justify-center bg-blue-600 text-white rounded-full w-12 h-12"
        >
          <span class="material-symbols-outlined">add_circle</span>
        </div>
        <div class="w-12 h-12 flex items-center justify-center text-slate-400">
          <span class="material-symbols-outlined">insights</span>
        </div>
        <div class="w-12 h-12 flex items-center justify-center text-slate-400">
          <span class="material-symbols-outlined">person</span>
        </div>
      </footer>
    </div>
    <!-- Modal Overlay -->
    <div
      class="fixed inset-0 z-[60] bg-on-background/10 backdrop-blur-sm flex items-center justify-center p-6"
    >
      <!-- Compact Registration Modal -->
      <div
        class="glass-panel w-full max-w-sm rounded-lg shadow-[0_24px_48px_rgba(0,0,0,0.12)] overflow-hidden border border-white/40 flex flex-col"
      >
        <!-- Modal Header -->
        <div class="px-6 pt-6 pb-2">
          <h1
            class="font-headline text-2xl font-extrabold text-on-surface tracking-tight leading-tight"
          >
            Registrar Glicose
          </h1>
          <p
            class="font-label text-[10px] text-on-surface-variant/70 uppercase tracking-widest mt-0.5"
          >
            Insira os dados atuais
          </p>
        </div>
        <!-- Modal Content -->
        <div class="px-6 py-3 space-y-4 overflow-y-auto max-h-[500px]">
          <!-- Compact Numeric Input -->
          <div class="relative group">
            <div
              class="absolute -top-2 left-3 px-1.5 bg-white/60 backdrop-blur-md rounded text-[9px] font-bold tracking-widest text-primary uppercase z-10"
            >
              Glicemia
            </div>
            <div
              class="flex items-center justify-between bg-surface-container-high/50 px-5 py-4 rounded-lg transition-all focus-within:bg-surface-container-lowest border border-transparent focus-within:border-primary/20"
            >
              <input
                class="bg-transparent border-none p-0 text-4xl font-headline font-black text-on-surface focus:ring-0 w-2/3 placeholder:text-surface-container-highest"
                placeholder="000"
                type="number"
              />
              <span
                class="font-headline text-sm font-bold text-outline uppercase tracking-wider"
                >mg/dL</span
              >
            </div>
          </div>
          <!-- Compact Meal Selection -->
          <div class="space-y-2">
            <h3
              class="font-label text-[10px] font-bold uppercase tracking-[0.15em] text-outline px-1"
            >
              Período
            </h3>
            <div class="relative group/scroll">
              <div
                class="h-[84px] overflow-y-auto pr-1 space-y-1.5 scrollbar-thin scrollbar-thumb-primary/20 scrollbar-track-transparent custom-scrollbar"
              >
                <div class="grid grid-cols-1 gap-1.5">
                  <!-- Meal Items -->
                  <button
                    class="flex items-center justify-between p-3 rounded-lg bg-primary/10 border border-primary/20 transition-all active:scale-[0.98] group"
                  >
                    <div class="flex items-center gap-3">
                      <span class="text-xl">☀️</span>
                      <span class="font-body font-bold text-sm text-primary"
                        >Café da manhã</span
                      >
                    </div>
                    <span
                      class="material-symbols-outlined text-primary text-lg"
                      style="font-variation-settings: &quot;FILL&quot; 1"
                      >check_circle</span
                    >
                  </button>
                  <button
                    class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low/60 hover:bg-white transition-all active:scale-[0.98] group"
                  >
                    <div class="flex items-center gap-3">
                      <span class="text-xl">🍎</span>
                      <span
                        class="font-body font-semibold text-sm text-on-surface"
                        >Lanche da manhã</span
                      >
                    </div>
                    <span
                      class="material-symbols-outlined text-primary text-lg opacity-0 group-hover:opacity-100 transition-opacity"
                      >check_circle</span
                    >
                  </button>
                  <button
                    class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low/60 hover:bg-white transition-all active:scale-[0.98] group"
                  >
                    <div class="flex items-center gap-3">
                      <span class="text-xl">🍛</span>
                      <span
                        class="font-body font-semibold text-sm text-on-surface"
                        >Almoço</span
                      >
                    </div>
                    <span
                      class="material-symbols-outlined text-primary text-lg opacity-0 group-hover:opacity-100 transition-opacity"
                      >check_circle</span
                    >
                  </button>
                  <button
                    class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low/60 hover:bg-white transition-all active:scale-[0.98] group"
                  >
                    <div class="flex items-center gap-3">
                      <span class="text-xl">☕</span>
                      <span
                        class="font-body font-semibold text-sm text-on-surface"
                        >Lanche da tarde</span
                      >
                    </div>
                    <span
                      class="material-symbols-outlined text-primary text-lg opacity-0 group-hover:opacity-100 transition-opacity"
                      >check_circle</span
                    >
                  </button>
                  <button
                    class="flex items-center justify-between p-3 rounded-lg bg-surface-container-low/60 hover:bg-white transition-all active:scale-[0.98] group"
                  >
                    <div class="flex items-center gap-3">
                      <span class="text-xl">🌙</span>
                      <span
                        class="font-body font-semibold text-sm text-on-surface"
                        >Jantar</span
                      >
                    </div>
                    <span
                      class="material-symbols-outlined text-primary text-lg opacity-0 group-hover:opacity-100 transition-opacity"
                      >check_circle</span
                    >
                  </button>
                </div>
              </div>
              <div class="flex justify-center mt-1 animate-bounce opacity-40">
                <span class="material-symbols-outlined text-outline text-base"
                  >keyboard_double_arrow_down</span
                >
              </div>
            </div>
          </div>
        </div>
        <!-- Modal Footer -->
        <div class="px-6 pb-6 pt-2 space-y-2">
          <button
            class="w-full py-3.5 rounded-full bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-base shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 active:scale-[0.97] transition-all flex items-center justify-center gap-2"
          >
            <span class="material-symbols-outlined text-xl">save</span>
            Registrar Glicose
          </button>
          <button
            class="w-full py-2.5 rounded-full text-on-surface-variant font-headline font-bold text-xs hover:bg-black/5 transition-colors active:scale-[0.97]"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>
    <!-- Custom Grain Overlay -->
    <div
      class="fixed inset-0 pointer-events-none opacity-[0.03] z-[100]"
      style="
        background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuAObTvbebbUOV6eIUyYTOU0ylpkyAK3jOHnWL-NvkJKkqG_GKVE00mK7tEOOnk50beeyjLBfQVI0yfw8IiaQeG50Ya-khfAzZ4KkjQD8GBCBEhHMco5X8guySW8L7Kme2wjLvQvse0gt62ZzRNHKa9cfq7oiXOfYrj9lxSlqRX4eFF13108xBwiwT0udBg_XqKT0WHMgu8XNfqXwg9eGWQi877yQOvB2MXhO-hkvjxMvlnKhyfyXvlNxuG0WHAOImuBMi_kXCDQkfs&quot;);
      "
    ></div>
  </body>
</html>
